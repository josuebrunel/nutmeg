root = "."
tmp_dir = "tmp"

[build]
  cmd = "templ generate && go build -o ./tmp/server ./cmd/server"
  bin = "./tmp/server"
  full_bin = "./tmp/server"
  include_ext = ["go", "templ", "sql"]
  exclude_regex = ["_templ.go$", "tmp/"]
  stop_on_error = true
  log = "build-errors.log"

[log]
  main_only = true

[misc]
  clean_on_exit = true
