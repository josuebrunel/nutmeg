services:
  nutmeg:
    container_name: nutmeg
    image: ghcr.io/josuebrunel/nutmeg:latest
    restart: unless-stopped
    ports:
      - "8380:8080"
    networks:
      - nutmeg
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  db:
    image: postgres:17-alpine
    container_name: nutmeg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nutmeg
    networks:
      - nutmeg
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nutmeg"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  nutmeg:
    driver: bridge

volumes:
  pgdata:
